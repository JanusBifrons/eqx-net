name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Deterministic non-test gates — typecheck + lint (boundary enforcement) +
  # the production build. Fast and never flaky.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint (boundary enforcement)
        run: pnpm run lint
      # C1 (plan squishy-canyon): dependency-cruiser encodes invariant #1 as a
      # real module graph (blocking — the leak.ts.disabled canary trips it).
      - name: Dependency graph (boundary DAG, invariant #1)
        run: pnpm exec depcruise src
      # C1: knip dead-code report — non-blocking until triaged (--no-exit-code),
      # promote to blocking after the backlog is cleared.
      - name: Dead-code report (knip, non-blocking)
        run: pnpm exec knip --no-exit-code
      # C4: dependency vulnerability scan. Fails only on high+ severity.
      - name: Dependency audit (high+)
        run: pnpm audit --prod --audit-level=high
      - name: Build
        run: pnpm run build

  # Unit + component + scenario suite (`vitest.config.ts`). Pure logic,
  # schemas, React components, replay/scenario fixtures — no real Colyseus
  # server. Its own required status check so a unit regression is
  # distinguishable at a glance from an integration one.
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # C2 (plan squishy-canyon): run the unit suite WITH coverage so the
      # coverage floor in vitest.config.ts gates here (coverage is a test run,
      # so it belongs in this job — not the build-only `verify` job — and it
      # already excludes *.integration.test.ts, matching this job's scope).
      - name: Unit tests + coverage floor
        run: pnpm run coverage

  # Integration suite (`vitest.integration.config.ts`). Boots a real
  # Colyseus Server + SectorRoom + physics worker + WebSocket transport per
  # test (single-threaded, no isolation — see the config's header for the
  # tinypool/decorator/node:sqlite rationale). Separated from the unit job
  # because it has a different pool configuration and a distinct failure
  # surface (wire format, broadcast gates, schema diff). Its own required
  # status check.
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Integration tests
        run: pnpm run test:integration

  # C3 (plan squishy-canyon): perf benchmarks. `continue-on-error` initially —
  # bench timing is runner-load-sensitive, so a single noisy run must not fail a
  # PR. Promote to blocking once variance data confirms the budgets are stable
  # on CI runners (bench:check is relative/budgeted, so promotion is feasible).
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Benchmarks (budget check)
        run: pnpm run bench:check

  # E2E gate — the @smoke tier ONLY (deterministic critical-path locks).
  #
  # Scope (2026-06-03): CI gates on @smoke, NOT @smoke+@feature. The @feature
  # tier carries pre-existing flaky locks (two-client room-sharing races, tight
  # host-load-sensitive correction-rate timing) that predate the determinism
  # refactor and are a separate de-flake project; gating PR merges on them
  # would make CI red on environment noise. @feature stays runnable via
  # `pnpm e2e` locally and is incrementally de-flaked + promoted. See
  # docs/architecture/e2e-framework.md "CI scope".
  #
  # Parallelism: a `shard` MATRIX runs N independent jobs, each with its OWN
  # dev:server:nowatch + vite (the `workers:1` shared-server contention that
  # blocks in-process parallelism does not apply ACROSS jobs). Playwright splits
  # the @smoke files by `--shard=i/N`; per-test rooms (`filterBy(['testId'])`)
  # keep each shard isolated.
  #
  # Reruns: PLAYWRIGHT_RETRIES=2 absorbs the occasional transient two-client /
  # timing flake so a single environment hiccup doesn't fail a PR. (Local dev
  # stays 0 retries per the repo's anti-flake policy — this override is the
  # documented "known-flaky environment" escape hatch in playwright.config.ts.)
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      # Call Playwright directly (NOT `pnpm run e2e:smoke -- --shard=…`) — pnpm
      # forwards the `--` separator literally, so playwright received "--" and
      # "--shard=1/2" as positional path filters and matched zero tests
      # ("No tests found"). `pnpm exec` passes --shard as a real flag.
      - name: Playwright E2E (smoke, shard ${{ matrix.shard }}/2)
        run: pnpm exec playwright test --project=smoke --shard=${{ matrix.shard }}/2
        env:
          CI: 'true'
          PLAYWRIGHT_RETRIES: '2'
