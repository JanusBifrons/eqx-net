name: Netgate

# Netcode-health gate (invariant #8 / #8-corollary). The deterministic CI
# (ci.yml `verify` + `e2e-smoke`) is NOT a playability signal — the 2026-05-19
# incident shipped every deterministic gate green and was unplayable on-device.
# This gate joins a real Colyseus room over an injected mobile-network profile
# and compares the working tree's `data-pred-stats` against a same-session
# `origin/main` baseline arm on the SAME runner (so host noise hits both arms
# equally — the anti-flake design is mechanism, not margin).
#
# MULTI-SCENARIO (plan: misty-teapot): the gate runs a CATALOGUE of scenarios
# (tests/netgate/scenarios.ts), not just feel-test-25. The `changes` job maps a
# PR's changed files to the set of scenarios to run via tests/netgate/
# select-scenarios.mjs (the single source of truth for "what is the live loop"
# now lives in those two files, not in this YAML) — so a structures/scrap PR
# runs only the affected scenario(s), and a docs PR runs none.
#
# PATH-FILTERED *inside* the workflow (required-check pattern): `netgate` is a
# REQUIRED status check in branch protection, and a required check that never
# reports blocks the PR forever ("Expected — waiting for status"). `on.paths`
# filtering therefore CANNOT gate this workflow — a docs-only PR would never
# satisfy the check. Instead the workflow triggers on every PR; the cheap
# `changes` job selects scenarios; the heavy `netgate-run` job runs only when
# the set is non-empty; and the `netgate` summary job — the one branch
# protection requires — ALWAYS reports: success when the gate passed or was
# legitimately skipped, failure when it ran and failed OR the selection itself
# broke (FAIL-CLOSED). See src/server/CLAUDE.md "Netcode-health gate".

on:
  pull_request:
    branches: [main]
  # Manual runs for VARIANCE CHARACTERISATION + bisecting. `head_ref` selects
  # the HEAD arm; set it to `origin/main` for a main-vs-main run (two identical
  # arms) to measure a metric's natural run-to-run variance on the CI runner —
  # the prescribed way to decide whether a RED is a code regression or noise
  # (see src/server/CLAUDE.md "Netcode-health gate" + netHealthBudget.ts).
  # Blank ⇒ the PR working tree (same as the pull_request path). `scenarios`
  # lets a manual run target ANY scenario by name, INCLUDING a print-only perf
  # scenario for characterisation (which never runs per-PR).
  workflow_dispatch:
    inputs:
      head_ref:
        description: 'HEAD arm ref vs origin/main (blank = working tree; origin/main = variance characterisation)'
        required: false
        default: ''
      reps:
        description: 'Interleaved A/B rep count (default 4)'
        required: false
        default: '4'
      scenarios:
        description: 'CSV of scenario names to run (default core; e.g. structures-load,scrap-load for characterisation)'
        required: false
        default: 'core'

# Cancel a superseded run when a new commit is pushed to the same PR — the
# netgate is a multi-minute job, so racing stale runs waste a runner. Never
# cancels a non-PR run (there are none here, but the guard is explicit).
concurrency:
  group: netgate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Cheap scenario selector. Reads the PR's changed files via the API and maps
  # them to scenarios through select-scenarios.mjs (plain node — no pnpm
  # install). FAIL-CLOSED: an API error fails the step (→ summary FAILs); a
  # truncated/empty file list selects ALL gated scenarios (never "skip").
  # workflow_dispatch selects the `scenarios` input directly (deliberate run).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      scenarios: ${{ steps.filter.outputs.scenarios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # only need tests/netgate/select-scenarios.mjs
      - name: Select netgate scenarios from changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_SCENARIOS: ${{ github.event.inputs.scenarios }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            SEL="${DISPATCH_SCENARIOS:-core}"
            echo "manual dispatch — scenarios=$SEL"
            echo "scenarios=$SEL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # gh api failure ⇒ set -e fails the step ⇒ summary FAILs (fail-closed).
          FILES=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')
          echo "changed files:"; echo "$FILES"
          COUNT=$(printf '%s\n' "$FILES" | grep -c . || true)
          if [ "$COUNT" -ge 3000 ]; then
            # GitHub's list-PR-files endpoint caps at 3000 — a larger PR is
            # truncated and could hide the one live-loop file. Fail-closed:
            # empty stdin makes the selector return ALL gated scenarios.
            echo "file list at/over API cap ($COUNT) — possible truncation; selecting ALL gated (fail-closed)"
            SEL=$(printf '' | node tests/netgate/select-scenarios.mjs)
          else
            SEL=$(printf '%s\n' "$FILES" | node tests/netgate/select-scenarios.mjs)
          fi
          echo "selected scenarios: '$SEL'"
          echo "scenarios=$SEL" >> "$GITHUB_OUTPUT"

  # The heavy gate. Runs only when the selector picked ≥1 scenario (or on manual
  # dispatch). NOT the required check — `netgate` below is.
  netgate-run:
    needs: changes
    if: needs.changes.outputs.scenarios != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # The driver creates git worktrees and compares against origin/main —
          # both need full history + the base ref present locally.
          fetch-depth: 0
      - name: Fetch baseline ref (origin/main)
        run: git fetch origin main:refs/remotes/origin/main
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      # Baseline = origin/main, head = the PR working tree (default args). The
      # driver boots two HMR-disabled vite arms + per-arm latency proxy and runs
      # the netcode-health spec interleaved for each selected scenario; it exits
      # non-zero on RED.
      - name: Netcode-health gate (head vs origin/main)
        run: pnpm run e2e:netgate "origin/main" "${{ github.event.inputs.head_ref }}"
        env:
          CI: 'true'
          # Only the selected scenarios run (per-PR cost matches what changed).
          NETGATE_SCENARIOS: ${{ needs.changes.outputs.scenarios }}
          # PR runs default to 8 interleaved A/B reps (was 4). The gate is a
          # MEDIAN over reps; `ticksAhead` (lookahead) is the variance-prone
          # metric (a single snapshot-starved window on a shared CI runner —
          # e.g. PR #18 saw HEAD snaps 80 vs baseline 103 → ticksAhead 42 vs 27
          # on otherwise-equal arms). More reps tightens the median. A SINGLE
          # bounded auto-retry on a fresh runner (the `netgate-retry` job,
          # 2026-06-15) absorbs a transient host spike that survives even 8 reps
          # — this is NOT retry-until-green: a failure that SURVIVES the retry
          # is treated as LEGITIMATE (investigate the netcode, never "host
          # flake"). A margin is NEVER widened to silence a flake. Characterise
          # a suspected flake via the workflow_dispatch main-vs-main run
          # (head_ref=origin/main).
          NETGATE_REPS: ${{ github.event.inputs.reps || '8' }}

  # NOTE: the auto-retry is NOT here — `rerun-failed-jobs` is rejected (HTTP 403
  # "workflow is already running") when called from a job INSIDE the still-
  # running run. The bounded one-shot retry lives in the separate
  # `auto-retry.yml` (workflow_run-triggered, fires after this run COMPLETES).

  # The REQUIRED status check (branch protection requires the check named
  # `netgate`). Always reports: pass when the gate passed OR was legitimately
  # skipped (no scenarios selected); fail when the gate ran and failed, OR when
  # the SELECTION itself broke (fail-closed — a skipped gate must never read as
  # healthy unless the selector explicitly returned an empty, non-error set).
  # On a failure, the message distinguishes the auto-retry attempt (attempt 1)
  # from the LEGITIMATE post-retry failure (attempt ≥ 2).
  netgate:
    needs: [changes, netgate-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve gate result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUN_RESULT: ${{ needs.netgate-run.result }}
          SCENARIOS: ${{ needs.changes.outputs.scenarios }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          # Fail-closed: if the selector job itself broke, we do NOT know
          # whether the live loop changed — treat as a failure, never a skip.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "netgate FAILED — scenario selection broke (changes result=$CHANGES_RESULT)"
            exit 1
          fi
          if [ "$RUN_RESULT" = "success" ]; then
            echo "netgate PASS (scenarios=$SCENARIOS)"
            exit 0
          fi
          if [ "$RUN_RESULT" = "skipped" ] && [ -z "$SCENARIOS" ]; then
            echo "netgate skipped — no live-loop scenarios selected"
            exit 0
          fi
          if [ "$RUN_ATTEMPT" = "1" ]; then
            echo "netgate FAILED on attempt 1 (scenarios='$SCENARIOS') — the Auto-retry workflow re-runs it once on a fresh runner."
          else
            echo "netgate FAILED after an auto-retry (attempt $RUN_ATTEMPT, scenarios='$SCENARIOS') — LEGITIMATE. Investigate the netcode; do NOT dismiss as a host flake."
          fi
          exit 1
