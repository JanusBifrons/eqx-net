name: Netgate

# Netcode-health gate (invariant #8 / #8-corollary). The deterministic CI
# (ci.yml `verify` + `e2e-smoke`) is NOT a playability signal — the 2026-05-19
# incident shipped every deterministic gate green and was unplayable on-device.
# This gate joins a real Colyseus room over an injected mobile-network profile
# and compares the working tree's `data-pred-stats` against a same-session
# `origin/main` baseline arm on the SAME runner (so host noise hits both arms
# equally — the anti-flake design is mechanism, not margin).
#
# PATH-FILTERED: runs ONLY when a PR touches the live loop (client net /
# prediction / physics / render loop / snapshot decode-interpolate / mount aim /
# SectorRoom tick+snapshot / the wire contracts those ride). Doc/test/unrelated
# PRs skip it. See src/server/CLAUDE.md "Netcode-health gate".
#
# This job is intended to be a REQUIRED status check in branch protection.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/client/net/**'
      - 'src/client/render/**'
      - 'src/core/prediction/**'
      - 'src/core/physics/**'
      - 'src/core/ai/WeaponMountController.ts'
      - 'src/server/rooms/SectorRoom.ts'
      - 'src/server/rooms/SnapshotBroadcaster.ts'
      - 'src/server/rooms/EntitySyncRouter.ts'
      - 'src/server/net/**'
      - 'src/shared-types/swarmWireFormat.ts'
      - 'src/shared-types/messages/**'
      - 'tests/netgate/**'
      - 'tests/e2e/netcode-health.spec.ts'
      # Self-trigger: a change to the gate workflow itself re-runs it (so the
      # retry harness is exercised on the PR that edits it). head==baseline
      # netcode ⇒ ratios ≈ 1 ⇒ passes.
      - '.github/workflows/netgate.yml'
  # Manual runs for VARIANCE CHARACTERISATION + bisecting. `head_ref` selects
  # the HEAD arm; set it to `origin/main` for a main-vs-main run (two identical
  # arms) to measure a metric's natural run-to-run variance on the CI runner —
  # the prescribed way to decide whether a RED is a code regression or noise
  # (see src/server/CLAUDE.md "Netcode-health gate" + netHealthBudget.ts).
  # Blank ⇒ the PR working tree (same as the pull_request path).
  workflow_dispatch:
    inputs:
      head_ref:
        description: 'HEAD arm ref vs origin/main (blank = working tree; origin/main = variance characterisation)'
        required: false
        default: ''
      reps:
        description: 'Interleaved A/B rep count (default 4)'
        required: false
        default: '4'

jobs:
  netgate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # The driver creates git worktrees and compares against origin/main —
          # both need full history + the base ref present locally.
          fetch-depth: 0
      - name: Fetch baseline ref (origin/main)
        run: git fetch origin main:refs/remotes/origin/main
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      # Baseline = origin/main, head = the PR working tree (default args). The
      # driver boots two HMR-disabled vite arms + per-arm latency proxy and runs
      # the netcode-health spec interleaved; it exits non-zero on RED.
      - name: Netcode-health gate (head vs origin/main)
        # Explicit args == the prior no-arg defaults for pull_request (head_ref
        # is empty ⇒ working tree); workflow_dispatch can override the HEAD arm
        # (e.g. origin/main for a main-vs-main variance run).
        #
        # AUTO-RETRY (2026-06-07): the gate is RELATIVE (head vs a same-runner
        # baseline arm) and runs on shared GitHub runners, whose load variance
        # the netgate docs flag as the dominant flake source — the spike/rate
        # metrics (`rollingCorrRate`, `maxDriftUnits`) can tip on a noisy runner
        # while `meanDriftUnits` stays flat. We rerun the WHOLE measurement up to
        # NETGATE_MAX_ATTEMPTS times and PASS if ANY attempt is green; only all-
        # fail is RED. This does NOT widen any budget margin (the anti-flake
        # rule is "fix the mechanism, not the threshold") — a genuine regression
        # fails every attempt, whereas a relative gate flipping green on a rerun
        # of identical code is variance by definition. PR #12 hit exactly this:
        # attempt 1 RED (corr 0.95 vs 0.25), a rerun on the SAME sha went green.
        env:
          CI: 'true'
          NETGATE_REPS: ${{ github.event.inputs.reps || '4' }}
          NETGATE_HEAD_REF: ${{ github.event.inputs.head_ref }}
          NETGATE_MAX_ATTEMPTS: '3'
        run: |
          attempts="${NETGATE_MAX_ATTEMPTS:-3}"
          for i in $(seq 1 "$attempts"); do
            echo "::group::[netgate] attempt $i/$attempts"
            if pnpm run e2e:netgate "origin/main" "$NETGATE_HEAD_REF"; then
              echo "::endgroup::"
              echo "[netgate] PASS on attempt $i/$attempts"
              exit 0
            fi
            echo "::endgroup::"
            echo "[netgate] attempt $i/$attempts FAILED — retrying if attempts remain"
          done
          echo "[netgate] all $attempts attempts failed — netcode-health RED (treat as a REAL regression, not a flake)"
          exit 1
