name: Netgate

# Netcode-health gate (invariant #8 / #8-corollary). The deterministic CI
# (ci.yml `verify` + `e2e-smoke`) is NOT a playability signal — the 2026-05-19
# incident shipped every deterministic gate green and was unplayable on-device.
# This gate joins a real Colyseus room over an injected mobile-network profile
# and compares the working tree's `data-pred-stats` against a same-session
# `origin/main` baseline arm on the SAME runner (so host noise hits both arms
# equally — the anti-flake design is mechanism, not margin).
#
# PATH-FILTERED *inside* the workflow (required-check pattern): `netgate` is a
# REQUIRED status check in branch protection, and a required check that never
# reports blocks the PR forever ("Expected — waiting for status"). `on.paths`
# filtering therefore CANNOT gate this workflow — a docs-only PR would never
# satisfy the check. Instead the workflow triggers on every PR; the cheap
# `changes` job decides whether live-loop paths changed (client net /
# prediction / physics / render loop / snapshot decode-interpolate / mount aim
# / SectorRoom tick+snapshot / the wire contracts those ride); the heavy
# `netgate-run` job runs only when they did; and the `netgate` summary job —
# the one branch protection requires — ALWAYS reports: success when the gate
# passed or was legitimately skipped, failure when it ran and failed (or the
# path detection itself broke — fail-closed). See src/server/CLAUDE.md
# "Netcode-health gate".

on:
  pull_request:
    branches: [main]
  # Manual runs for VARIANCE CHARACTERISATION + bisecting. `head_ref` selects
  # the HEAD arm; set it to `origin/main` for a main-vs-main run (two identical
  # arms) to measure a metric's natural run-to-run variance on the CI runner —
  # the prescribed way to decide whether a RED is a code regression or noise
  # (see src/server/CLAUDE.md "Netcode-health gate" + netHealthBudget.ts).
  # Blank ⇒ the PR working tree (same as the pull_request path).
  workflow_dispatch:
    inputs:
      head_ref:
        description: 'HEAD arm ref vs origin/main (blank = working tree; origin/main = variance characterisation)'
        required: false
        default: ''
      reps:
        description: 'Interleaved A/B rep count (default 4)'
        required: false
        default: '4'

jobs:
  # Cheap path filter — the single source of truth for "what is the live
  # loop". Reads the PR's changed files via the API (no checkout needed).
  # workflow_dispatch always counts as live-loop (manual runs are deliberate).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      liveloop: ${{ steps.filter.outputs.liveloop }}
    steps:
      - name: Detect live-loop changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "manual dispatch — netgate always runs"
            echo "liveloop=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Keep this list in sync with the live-loop definition in
          # src/server/CLAUDE.md "Netcode-health gate" (it mirrors the old
          # on.paths list verbatim).
          PATTERN='^src/client/net/|^src/client/render/|^src/core/prediction/|^src/core/physics/|^src/core/ai/WeaponMountController\.ts$|^src/server/rooms/SectorRoom\.ts$|^src/server/rooms/SnapshotBroadcaster\.ts$|^src/server/rooms/EntitySyncRouter\.ts$|^src/server/net/|^src/shared-types/swarmWireFormat\.ts$|^src/shared-types/messages/|^tests/netgate/|^tests/e2e/netcode-health\.spec\.ts$'
          FILES=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')
          echo "changed files:"
          echo "$FILES"
          if echo "$FILES" | grep -E -q "$PATTERN"; then
            echo "live-loop paths changed — netgate will run"
            echo "liveloop=true" >> "$GITHUB_OUTPUT"
          else
            echo "no live-loop paths changed — netgate will be skipped"
            echo "liveloop=false" >> "$GITHUB_OUTPUT"
          fi

  # The heavy gate. Runs only when the PR touches the live loop (or on manual
  # dispatch). NOT the required check — `netgate` below is.
  netgate-run:
    needs: changes
    if: needs.changes.outputs.liveloop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # The driver creates git worktrees and compares against origin/main —
          # both need full history + the base ref present locally.
          fetch-depth: 0
      - name: Fetch baseline ref (origin/main)
        run: git fetch origin main:refs/remotes/origin/main
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      # Baseline = origin/main, head = the PR working tree (default args). The
      # driver boots two HMR-disabled vite arms + per-arm latency proxy and runs
      # the netcode-health spec interleaved; it exits non-zero on RED.
      - name: Netcode-health gate (head vs origin/main)
        # Explicit args == the prior no-arg defaults for pull_request (head_ref
        # is empty ⇒ working tree); workflow_dispatch can override the HEAD arm
        # (e.g. origin/main for a main-vs-main variance run).
        run: pnpm run e2e:netgate "origin/main" "${{ github.event.inputs.head_ref }}"
        env:
          CI: 'true'
          # PR runs default to 8 interleaved A/B reps (was 4). The gate is a
          # MEDIAN over reps; `ticksAhead` (lookahead) is the variance-prone
          # metric (a single snapshot-starved window on a shared CI runner —
          # e.g. PR #18 saw HEAD snaps 80 vs baseline 103 → ticksAhead 42 vs 27
          # on otherwise-equal arms). More reps tightens the median WITHOUT the
          # bias of a job-level retry-until-green (which would also mask a real
          # ~60%-reproducing regression). This is a MECHANISM fix, not a margin
          # widening (anti-flake policy: src/server/CLAUDE.md "Netcode-health
          # gate"). Characterise a suspected flake via the workflow_dispatch
          # main-vs-main run (head_ref=origin/main) before tuning further.
          NETGATE_REPS: ${{ github.event.inputs.reps || '8' }}

  # The REQUIRED status check (branch protection requires the check named
  # `netgate`). Always reports: pass when the gate passed OR was legitimately
  # skipped (no live-loop paths); fail when the gate ran and failed, or when
  # anything upstream broke (fail-closed — a skipped gate must never read as
  # healthy unless the path filter explicitly said "not live-loop").
  netgate:
    needs: [changes, netgate-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve gate result
        env:
          RUN_RESULT: ${{ needs.netgate-run.result }}
          LIVELOOP: ${{ needs.changes.outputs.liveloop }}
        run: |
          set -euo pipefail
          if [ "$RUN_RESULT" = "success" ]; then
            echo "netgate PASS"
            exit 0
          fi
          if [ "$RUN_RESULT" = "skipped" ] && [ "$LIVELOOP" = "false" ]; then
            echo "netgate skipped — no live-loop paths changed"
            exit 0
          fi
          echo "netgate FAILED (run result=$RUN_RESULT, liveloop=$LIVELOOP)"
          exit 1
