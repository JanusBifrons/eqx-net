<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#05070f" />
    <!-- The web manifest <link> is injected by vite-plugin-pwa (manifest.webmanifest). -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>EQX Peri</title>
    <style>
      :root {
        /* Fixed AppHeader height. Slot anchors padded with this so HUD widgets
           never paint underneath the header. The header is hidden on touch
           devices (`pointer: coarse`) regardless of viewport width — phones
           in landscape are 667+ px wide so a width-based breakpoint would
           leave the AppBar visible there. */
        --app-bar-h: 48px;
        /* Edge inset applied by the bottom-left/bottom-right anchor hosts
           (joystick + fire/boost). 16 px is the comfortable default; on a
           phone in landscape the user's grip naturally curls inward, so the
           media query below kicks the controls further from the bezel. */
        --mobile-edge-inset: 16px;
      }
      @media (pointer: coarse) {
        :root { --app-bar-h: 0px; }
      }
      @media (orientation: landscape) and (pointer: coarse) {
        :root { --mobile-edge-inset: 40px; }
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        color: #eee;
        font-family: system-ui, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        /* P6.2: suppress the Android long-press text-selection gesture (and its
           OS haptic) so click-and-hold during structure placement doesn't
           vibrate / hijack the touch sequence. Paired with the contextmenu
           handler that no longer cancels placement on a touch long-press. */
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      canvas { display: block; touch-action: none; -webkit-user-select: none; user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
